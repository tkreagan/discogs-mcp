name = "discogs-mcp"
main = "src/index-oauth.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Development environment (default)
[[kv_namespaces]]
binding = "MCP_LOGS"
id = "0dca19b778704fa59cb5e81b75fe974f"

[[kv_namespaces]]
binding = "MCP_RL"
id = "fc992d3d72bc47cf8a481f3255bcaf05"

[[kv_namespaces]]
binding = "MCP_SESSIONS"
id = "53510d8b2d2448c5bca97ade996ac52c"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "6ced148a309f4aaeb4eca0d2083c3aa5"

# Production environment
[env.production]
name = "discogs-mcp"

[[env.production.kv_namespaces]]
binding = "MCP_LOGS"
id = "0dca19b778704fa59cb5e81b75fe974f"

[[env.production.kv_namespaces]]
binding = "MCP_RL"
id = "fc992d3d72bc47cf8a481f3255bcaf05"

[[env.production.kv_namespaces]]
binding = "MCP_SESSIONS"
id = "53510d8b2d2448c5bca97ade996ac52c"

[[env.production.kv_namespaces]]
binding = "OAUTH_KV"
id = "6ced148a309f4aaeb4eca0d2083c3aa5"

# Secrets (set via wrangler secret put):
# - DISCOGS_CONSUMER_KEY
# - DISCOGS_CONSUMER_SECRET
# - JWT_SECRET
